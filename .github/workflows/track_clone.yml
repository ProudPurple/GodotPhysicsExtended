name: Track Clone Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.STATS_TOKEN }}

      - name: Fetch and log clone stats
        env:
          TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          mkdir -p stats

          FILE=stats/clone_log.csv

          # Create file with header if it doesn't exist
          if [ ! -f "$FILE" ]; then
            echo "date,repo,total_clones,unique_cloners,daily_new_clones" > "$FILE"
          fi

          DATE=$(date -u +"%Y-%m-%d")

          for REPO in SpringBody2D; do
            RESPONSE=$(curl -s -H "Authorization: token $TOKEN" \
              "https://api.github.com/repos/ProudPurple/$REPO/traffic/clones")

            COUNT=$(echo "$RESPONSE" | jq '.count')
            UNIQUES=$(echo "$RESPONSE" | jq '.uniques')

            # Get last DATA row (not header)
            LAST_LINE=$(grep -v "^date," "$FILE" | tail -n 1)

            PREV=$(echo "$LAST_LINE" | cut -d',' -f3)

            # Default to 0 if empty or non-numeric
            if ! [[ "$PREV" =~ ^[0-9]+$ ]]; then
              PREV=0
            fi


            # Compute daily new clones
            DAILY_NEW=$(( COUNT - PREV ))
            if [ "$DAILY_NEW" -lt 0 ]; then
              DAILY_NEW=0
            fi
